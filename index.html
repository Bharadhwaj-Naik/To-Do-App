<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css">

</head>
<body>
  <main aria-labelledby="app-heading">
    <h1 id="app-heading"> Task Manager</h1>

    <form id="add-task-form" class="task-form" aria-label="Add new task">
      <input type="text" id="task-title-input" placeholder="Task title..." required autocomplete="off">
      <input type="date" id="task-date-input">
      <select id="task-priority-input">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button type="submit">Add Task</button>
    </form>

    <div class="filter-bar" role="group" aria-label="Filter tasks">
      <legend>Show:</legend>
      <button type="button" class="filter-btn active-filter" data-filter="all">All</button>
      <button type="button" class="filter-btn" data-filter="active">Active</button>
      <button type="button" class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <section aria-label="Task list">
      <ul id="task-list" class="task-list">
      </ul>
      <div id="empty-state" class="empty-message" style="display: none;">No tasks to show.</div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
