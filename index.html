<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>📋 Task Manager</h1>

        <!-- Add Task Form -->
        <form id="add-task-form">
            <input type="text" id="task-title-input" placeholder="Task title..." required>
            <button type="submit">Add Task</button>
        </form>

        <!-- Filter Bar -->
        <div>
            <button type="button" data-filter="all">All</button>
            <button type="button" data-filter="active">Active</button>
            <button type="button" data-filter="completed">Completed</button>
        </div>

        <!-- Task List -->
        <section>
            <ul id="task-list">
                <!-- Tasks will be rendered here -->
            </ul>
            <div id="empty-state">No tasks to show.</div>
        </section>
    </main>


    <script src="script.js"></script>
</body>

</html>
